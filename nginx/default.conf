upstream service_a {
    server 127.0.0.1:3001;
}

map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

# Structured JSON logging for request tracing
log_format json_combined escape=json
    '{'
    '"timestamp":"$time_iso8601",'
    '"service":"nginx",'
    '"request_id":"$req_id",'
    '"event":"request_received",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"bytes_sent":$bytes_sent,'
    '"remote_addr":"$remote_addr",'
    '"upstream":"$upstream_addr",'
    '"request_time":$request_time,'
    '"upstream_time":"$upstream_response_time",'
    '"upstream_status":"$upstream_status",'
    '"http_version":"$server_protocol"'
    '}';

# Error log format with request tracing
log_format json_error escape=json
    '{'
    '"timestamp":"$time_iso8601",'
    '"service":"nginx",'
    '"request_id":"$req_id",'
    '"event":"error",'
    '"level":"$severity",'
    '"message":"$message",'
    '"remote_addr":"$remote_addr"'
    '}';

server {
    listen 80 default_server;
    server_name _;

    # Structured error logging with tracing
    error_log /var/log/nginx/error.json json_error;
    access_log /var/log/nginx/access.json json_combined;

    # Only expose Service A
    location /service-a/ {
        # Ensure X-Request-ID is propagated
        set $request_id_to_use $req_id;
        proxy_pass http://service_a/;
        proxy_set_header X-Request-ID $request_id_to_use;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Enable upstream timing logging
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        
        access_log /var/log/nginx/access.json json_combined;
    }

    # Log 404 errors with request ID for tracing
    location / {
        access_log /var/log/nginx/access.json json_combined;
        return 404;
    }
}
}