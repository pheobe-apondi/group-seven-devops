upstream service_a {
    server service-a:3001;
}

server {
    listen 80 default_server;
    server_name _;

    location /service-a/ {
        proxy_pass http://service_a/;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Request-ID $http_x_request_id;
    }

    location / {
        return 404;
    }
}
