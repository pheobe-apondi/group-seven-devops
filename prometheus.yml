global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "service-a"
    static_configs:
      - targets: ["service-a:3001"]

  - job_name: "service-b"
    static_configs:
      - targets: ["service-b:3002"]

  - job_name: "service-c"
    static_configs:
      - targets: ["service-c:3003"]
