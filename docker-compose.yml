services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - service-a
    restart: unless-stopped
    networks:
      - frontend

  service-a:
    build:
      context: ./services/service-a
      dockerfile: Dockerfile
    environment:
      BIND_HOST: 0.0.0.0
      SERVICE_B_URL: http://service-b:3002
      SERVICE_C_URL: http://service-c:3003
    depends_on:
      - service-b
      - service-c
    restart: unless-stopped
    networks:
      - frontend
      - backend

  service-b:
    build:
      context: ./services/service-b
      dockerfile: Dockerfile
    environment:
      BIND_HOST: 0.0.0.0
      SERVICE_C_URL: http://service-c:3003
    restart: unless-stopped
    networks:
      - backend

  service-c:
    build:
      context: ./services/service-c
      dockerfile: Dockerfile
    environment:
      BIND_HOST: 0.0.0.0
    restart: unless-stopped
    networks:
      - backend

networks:
  frontend:
  backend:
    internal: true
