services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      service-a:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  service-a:
    build:
      context: .
      dockerfile: services/service-a/Dockerfile
    environment:
      BIND_HOST: 0.0.0.0
      SERVICE_B_URL: http://service-b:3002
      SERVICE_C_URL: http://service-c:3003
    depends_on:
      service-b:
        condition: service_healthy
      service-c:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  service-b:
    build:
      context: .
      dockerfile: services/service-b/Dockerfile
    environment:
      BIND_HOST: 0.0.0.0
      SERVICE_C_URL: http://service-c:3003
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  service-c:
    build:
      context: .
      dockerfile: services/service-c/Dockerfile
    environment:
      BIND_HOST: 0.0.0.0
    restart: unless-stopped
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3003/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  frontend:
  backend:
    internal: true
