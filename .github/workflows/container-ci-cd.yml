name: Container CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify code, build, and containers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: service-a
            path: ./services/service-a
          - service: service-b
            path: ./services/service-b
          - service: service-c
            path: ./services/service-c

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: |
          python -m pip install --upgrade pip
          pip install -r ../../requirements.txt
          pip install pytest

      - name: Run tests
        working-directory: ${{ matrix.path }}
        run: |
          python -m pytest -q tests || python -m unittest discover -s tests -p 'test_*.py'

      - name: Build Docker image locally
        run: |
          docker build \
            -t ${{ matrix.service }}:${{ github.sha }} \
            -f ${{ matrix.path }}/Dockerfile \
            ${{ matrix.path }}

  verify-compose:
    name: Verify Docker Compose stack
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config

      - name: Build Compose stack
        run: docker compose build --pull

      - name: Start Compose stack
        run: docker compose up -d

      - name: Show running services
        run: docker compose ps

      - name: Check gateway health
        run: |
          sleep 10
          curl --fail http://localhost:8080/service-a/health

      - name: Stop Compose stack
        if: always()
        run: docker compose down -v

  publish:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: verify-compose
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: service-a
            path: ./services/service-a
          - service: service-b
            path: ./services/service-b
          - service: service-c
            path: ./services/service-c

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short commit hash
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ matrix.service }}:sha-${{ env.SHORT_SHA }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Write deployment summary
        run: |
          echo "### Published Image" >> "$GITHUB_STEP_SUMMARY"
          echo "Service: ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ matrix.service }}:sha-${SHORT_SHA}" >> "$GITHUB_STEP_SUMMARY"
