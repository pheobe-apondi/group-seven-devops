services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      service-a:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  service-a:
    image: ${DOCKERHUB_USERNAME:?DOCKERHUB_USERNAME is required}/${APP_NAME:?APP_NAME is required}-service-a:${IMAGE_TAG:?IMAGE_TAG is required}
    environment:
      BIND_HOST: 0.0.0.0
      SERVICE_B_URL: http://service-b:3002
      SERVICE_C_URL: http://service-c:3003
    depends_on:
      service-b:
        condition: service_healthy
      service-c:
        condition: service_healthy
    networks:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  service-b:
    image: ${DOCKERHUB_USERNAME:?DOCKERHUB_USERNAME is required}/${APP_NAME:?APP_NAME is required}-service-b:${IMAGE_TAG:?IMAGE_TAG is required}
    environment:
      BIND_HOST: 0.0.0.0
      SERVICE_C_URL: http://service-c:3003
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  service-c:
    image: ${DOCKERHUB_USERNAME:?DOCKERHUB_USERNAME is required}/${APP_NAME:?APP_NAME is required}-service-c:${IMAGE_TAG:?IMAGE_TAG is required}
    environment:
      BIND_HOST: 0.0.0.0
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3003/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  frontend:
  backend:
    internal: true
